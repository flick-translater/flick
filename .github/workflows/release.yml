name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-aarch64
            target: aarch64-apple-darwin
            bundles: dmg
            files: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

          - os: macos-latest
            name: macos-x86_64
            target: x86_64-apple-darwin
            bundles: dmg
            files: |
              target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

          - os: windows-latest
            name: windows-x86_64
            target: ""
            bundles: nsis,msi
            files: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi

          - os: ubuntu-24.04
            name: linux-x86_64
            target: ""
            bundles: deb,rpm,appimage
            files: |
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
              target/release/bundle/appimage/*.AppImage

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package*.json

      - name: Setup Rust
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          app_version="${release_version%%-*}"

          sed -i.bak -E "s/^version = \".*\"/version = \"$app_version\"/" src-tauri/Cargo.toml
          rm src-tauri/Cargo.toml.bak

          echo "Release tag version: $release_version"
          echo "App package version: $app_version"
          grep '^version =' src-tauri/Cargo.toml

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "macOS signing secrets are not configured; skipping certificate import."
            exit 0
          fi

          certificate_path="$RUNNER_TEMP/apple-signing-certificate.p12"
          certificate_pem_path="$RUNNER_TEMP/apple-signing-certificate.pem"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          echo "Decoding macOS signing certificate"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -A -d -out "$certificate_path"

          echo "Creating temporary keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"

          echo "Importing macOS signing certificate"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          echo "Selecting temporary keychain"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"

          echo "Trusting certificate for codesigning"
          openssl pkcs12 \
            -in "$certificate_path" \
            -clcerts \
            -nokeys \
            -out "$certificate_pem_path" \
            -passin "pass:$APPLE_CERTIFICATE_PASSWORD"
          sudo security add-trusted-cert \
            -d \
            -r trustRoot \
            -p codeSign \
            -k "$keychain_path" \
            "$certificate_pem_path"

          echo "Available codesigning identities"
          security find-identity -v -p codesigning "$keychain_path"
          if ! security find-identity -v -p codesigning "$keychain_path" | grep -F "$APPLE_SIGNING_IDENTITY"; then
            echo "Signing identity was not found: $APPLE_SIGNING_IDENTITY" >&2
            exit 1
          fi

      - name: Build Tauri app
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          args=(
            "--config"
            "src-tauri/tauri.conf.json"
            "--bundles"
            "${{ matrix.bundles }}"
            "--ci"
          )

          if [ -n "${{ matrix.target }}" ]; then
            args+=("--target" "${{ matrix.target }}")
          fi

          node frontend/node_modules/@tauri-apps/cli/tauri.js build "${args[@]}"

      - name: List release assets
        shell: bash
        run: |
          find target -path '*bundle*' -type f | sort

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          files: ${{ matrix.files }}
